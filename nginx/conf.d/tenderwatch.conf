upstream backend {
    server backend:5000;
    keepalive 16;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name tenderwatch.zanah.co.ke localhost;

    client_max_body_size 10M;

    # ── Health check endpoint ──────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Flask API — all /api/* requests ──────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # CORS handled by Flask — don't add here to avoid duplication
    }

    # ── Next.js static assets — long cache ───────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    # ── Next.js image optimisation ────────────────────────────
    location /_next/image {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
    }

    # ── Next.js — everything else ─────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;

        # Short cache for HTML pages — content changes daily
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=60";
    }
}
